name: Android UI Tests

on:
  push:
    branches: [main]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Appium + driver
        run: |
          npm i -g appium
          appium driver install uiautomator2

      - name: Run Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6

          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -no-audio
            -no-boot-anim
            -no-snapshot
            -no-metrics
            -accel off

          script: |
            set -e

            echo "🚀 Waiting emulator..."

            adb wait-for-device

            echo "⏳ Waiting boot complete..."

            BOOT=""
            for i in $(seq 1 60); do
              BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$BOOT" = "1" ]; then
                echo "✅ Boot completed"
                break
              fi
              sleep 2
            done

            echo "📱 Device ready:"
            adb devices

            echo "📦 Installing APK..."
            curl -L -o app.apk https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk
            adb install -r app.apk

            echo "🧪 Running tests..."
            npm run test:android