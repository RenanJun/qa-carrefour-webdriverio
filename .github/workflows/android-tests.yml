name: Android UI Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium Server
        run: |
          appium --address 127.0.0.1 --port 4723 --log appium.log --log-timestamp &
          sleep 10

          echo "Waiting Appium..."
          until curl -s http://127.0.0.1:4723/status >/dev/null; do
            sleep 2
          done

          echo "Appium ready"

      - name: Enable KVM (optional)
        run: |
          sudo chown $USER /dev/kvm || true

      - name: Run Android Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6

          emulator-options: >
            -no-window
            -gpu off
            -no-audio
            -no-boot-anim
            -camera-back none
            -no-snapshot

          script: |
            bash -c '
              echo "Waiting emulator..."

              adb wait-for-device

              echo "Waiting Android boot..."

              while true; do
                BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")

                if [ "$BOOT" = "1" ]; then
                  echo "Android boot completed"
                  break
                fi

                sleep 2
              done

              echo "Device ready"
              adb devices

              echo "Downloading APK..."

              mkdir -p apps

              curl -L -o apps/app.apk \
                https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

              echo "Installing APK..."

              adb install -r apps/app.apk

              adb shell pm list packages | grep wdiodemoapp || true

              echo "Running tests..."

              npm run test:android
            '

      - name: Upload Appium Log
        if: always()
        run: cat appium.log || true

      - name: Upload Logcat
        if: always()
        run: adb logcat -d | tail -300 || true

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            allure-results
            test-results
            appium.log