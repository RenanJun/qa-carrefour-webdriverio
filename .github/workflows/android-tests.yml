name: Android UI Tests (PRO)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 🔥 FIX ADB
      - name: Reset ADB
        run: |
          adb kill-server || true
          adb start-server

      # 📦 Appium
      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium Server
        run: |
          appium --address 127.0.0.1 --port 4723 --log appium.log &
          npx wait-on http://127.0.0.1:4723/status

      # 🚀 EMULATOR
      - name: Run Android Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6

          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -no-audio
            -no-boot-anim
            -no-snapshot
            -no-metrics
            -camera-back none

          script: |
            set -e

            echo "🚀 Waiting emulator..."
            adb wait-for-device

            echo "⏳ Waiting boot..."

            bash -lc '
              for i in $(seq 1 90); do
                BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")

                if [ "$BOOT" = "1" ]; then
                  echo "✅ Boot completed"
                  exit 0
                fi

                sleep 2
              done

              echo "❌ Boot timeout"
              exit 1
            '

            adb devices

            echo "⬇️ Download APK"
            mkdir -p apps
            curl -L -o apps/app.apk \
              https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

            echo "📦 Install APK"
            adb install -r apps/app.apk

            echo "🧪 Running tests"
            npm run test:android

      # 📊 Allure results
      - name: Generate Allure Report
        if: always()
        run: |
          npm run report:generate || true

      # 📦 Upload artifacts
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            allure-results
            allure-report
            appium.log