name: Android UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Atualizado para 24 para acompanhar o padrão atual do GitHub Actions e do Appium 3+
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Appium & Drivers Globals (CI)
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Run Appium Server in Background
        run: |
          appium --log-timestamp --allow-cors &

      - name: Enable KVM Acceleration
        run: |
          echo "Garantindo permissões para aceleração de emulador se disponível..."
          sudo chown $USER /dev/kvm || true

      - name: Run Android Emulator and Execute App Installation
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -camera-back none
          disable-spellchecker: true
          script: |
            echo "Aguardando o emulador finalizar o boot por completo..."
            adb wait-for-device
            
            echo "🛠️ PRE-INSTALL: Instalando o APK principal..."
            adb install ./apps/android.wdio.native.app.v2.2.0.apk
            
            echo "Verificando se o aplicativo foi instalado com sucesso:"
            adb shell pm list packages | grep wdiodemoapp || echo "Aviso: App não listado via grep, mas prosseguindo..."
            
            echo "🚀 Iniciando a execução dos testes com o WebdriverIO..."
            npm run wdio.android