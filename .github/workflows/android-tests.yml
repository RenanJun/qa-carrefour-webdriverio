name: Android Mobile UI Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🛠️ NOVO PASSO: Instala o Appium e o driver UiAutomator2 necessários para o teste rodar
      - name: Install Appium and Android Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download APK for Testing
        run: |
          mkdir -p apps
          curl -L -o apps/android.wdio.native.app.v2.2.0.apk https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

      - name: Run Appium Tests inside Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -no-snapshot -camera-back none
          disable-animations: true
          script: |
            # Inicializa o Appium usando o pacote global recém-instalado
            appium --allow-cors &
            sleep 5
            
            # Executa os testes do package.json
            npm run test:telas
            
      - name: Upload Allure Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 10