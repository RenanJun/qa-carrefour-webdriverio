name: Android UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Appium & Drivers Globals (CI)
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Run Appium Server in Background
        run: |
          appium --log-timestamp --allow-cors &

      - name: Enable KVM Acceleration
        run: |
          echo "Garantindo permissões para aceleração de emulador..."
          sudo chown $USER /dev/kvm || true

      - name: Run Android Emulator and Execute App Installation
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -no-metrics
          disable-spellchecker: true
          script: |
            echo "Conectando ao dispositivo..."
            adb wait-for-device
            
            echo "Criando diretório temporário para o APK..."
            mkdir -p apps
            
            echo "Baixando o APK do WebdriverIO..."
            curl -L -o apps/android.apk https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk
            
            echo "Executando instalação direta via ADB..."
            adb install apps/android.apk
            
            echo "Disparando a suíte de testes com o WebdriverIO..."
            npx wdio run ./config/wdio.android.conf.js

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-screenshots
          path: ./allure-results/