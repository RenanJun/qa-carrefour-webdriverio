name: Android UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # ✅ EMULATOR (CONTROLADO PELO RUNNER)
      - name: Run Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6

          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -no-audio
            -no-boot-anim
            -no-snapshot
            -no-metrics

          script: |
            echo "📱 Device ready"
            adb devices

            echo "⏳ Waiting boot completion..."
            adb wait-for-device

            BOOT=""
            until [ "$BOOT" = "1" ]; do
              BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              sleep 2
            done

            echo "🚀 Installing APK..."
            curl -L -o app.apk https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk
            adb install -r app.apk

            echo "🧪 Running tests..."
            npm run test:android

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results