name: Android UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium
        run: |
          appium --address 127.0.0.1 --port 4723 --log appium.log --log-timestamp &
          sleep 10

          until curl -s http://127.0.0.1:4723/status; do
            echo "Waiting Appium..."
            sleep 2
          done

      - name: Run Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim

          script: |
            echo "Waiting emulator..."

            adb wait-for-device

            until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
              sleep 2
            done

            adb devices

            echo "Downloading APK..."
            mkdir -p apps

            curl -L -o apps/app.apk https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

            echo "Installing APK..."
            adb install -r apps/app.apk

            adb shell pm list packages | grep wdiodemoapp || true

            echo "Running tests..."
            npm run test:android

      - name: Appium Log
        if: always()
        run: cat appium.log || true

      - name: Logcat
        if: always()
        run: adb logcat -d | tail -200 || true